# Keep the window distinguishable from a black wallpaper
background               #000000
foreground               #ffffff
background_opacity 0.4

# Make selections obvious
selection_background     #d9d9d9
selection_foreground     #0b0b0c

# Cursor should always be visible
cursor                   #ffffff
cursor_text_color        #000000

# Underlines/links readable on dark
url_color                #cfcfcf

# Borders / tabs / titlebar
active_border_color      #f0f0f0
inactive_border_color    #3a3a3a
tab_bar_background       #0b0b0c
active_tab_background    #e6e6e6
active_tab_foreground    #0b0b0c
inactive_tab_background  #1a1a1d
inactive_tab_foreground  #b3b3b3

# Font
font_family Cascadia Code NF
bold_font Cascadia Code Bold 700
font_size 11.5
use_ligatures true

# Window Properties
window_padding_width 12
